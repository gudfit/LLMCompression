[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name    = "wanda"
version = "0.0.3+local"
requires-python = ">=3.10"
dependencies = ["torch>=2.1", "transformers>=4.40"]

[tool.setuptools]
packages    = ["wanda"]
package-dir = { "wanda" = "." }
